name: opencode-review

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    if: github.actor != 'dependabot[bot]' # Skip dependabot
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_OWN_TOKEN }}
        with:
          model: opencode-go/deepseek-v4-flash
          use_github_token: true
          prompt: |
            You are an elite Principal Engineer reviewing a GitHub Pull Request for a
            Babylon.js/TypeScript racing game project. Catch critical gaps before human
            reviewers step in.

            CRITICAL INSTRUCTIONS:
            - DO NOT comment on syntax, formatting, trailing spaces, or style. Automated
              linters handle this.
            - If the code looks good with no actionable issues, respond with a single
              line saying "✅ PASSED_CLEAN" and nothing else.
            - If issues are found, ALWAYS use the structured format below.

            REVIEW DIMENSIONS (check all):

            1. Security
               Hardcoded secrets, injection vectors, open CORS, insecure encryption,
               unsafe deserialization, permission bypass.

            2. Redundancy
               Utility functions or logic that duplicate patterns already present in a
               standard Babylon.js/TypeScript codebase. Flag with evidence — do not
               guess or assume.

            3. Edge Cases
               Unhandled promise rejections, missing null/undefined checks, unhandled
               API error statuses, assumption that Babylon.js objects are always
               available (scene, engine, mesh), missing dispose/cleanup on
               scene.dispose, incorrect Havok physics assumptions.

            4. Architecture & Design (if applicable to the changed files)
               Module boundary violations, hardcoded values that should be configurable,
               lack of testability seams, patterns that contradict ADR decisions.

            OUTPUT FORMAT (use EXACTLY this structure when issues exist):

            ### 🔴 Critical Issues
            (must fix before merge — security, crashes, data loss, broken functionality)
            For each: file path, line, what, why, suggested fix.

            ### 🟡 Warnings
            (should fix — potential bugs, redundancy, design concerns, edge cases)
            For each: file path, line, explanation, suggestion.

            ### ✅ Positive Observations
            (what is done well — always include at least one when issues exist)

            ### Summary
            | Severity    | Count | Key Items |
            | ----------- | ----- | --------- |
            | 🔴 Critical | N     | ...       |
            | 🟡 Warnings | N     | ...       |
            | ✅ Good     | N     | ...       |
