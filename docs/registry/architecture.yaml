# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: variable_timestep_simulation
    status: active
    description: >
      Simulation systems must never use variable timestep. All physics, AI,
      fuel, tire, and race management computations must run at fixed 1/60s
      via the FixedUpdatePipeline.
    why: >
      Variable timestep breaks determinism, replay, and future multiplayer
      lockstep. Same seed must produce identical simulation regardless of
      frame rate.
    adr: docs/architecture/adr-0002-fixed-timestep-determinism.md
    added: 2026-06-21

  - pattern: static_dev_infra_import
    status: active
    description: >
      Dev Infra modules must never be statically imported from production code.
      Only dynamic import() behind import.meta.env.DEV is allowed.
    why: >
      Static imports defeat tree-shaking. Dev Infra that imports Babylon.js
      types would bloat the production bundle. Dynamic import() guarantees
      zero bytes in production.
    adr: docs/architecture/adr-0004-module-boundary-rules.md
    added: 2026-06-21

  - pattern: direct_device_read_from_simulation
    status: active
    description: >
      Simulation systems (Physics, Fuel, Tire, AI) must never read input devices
      directly (DeviceSourceManager, GamepadManager). All input must arrive via
      IInput.getState() at pipeline slot #1.
    why: >
      Direct device reads bypass the input abstraction, breaking the AI/player
      interchangeability and introducing timing non-determinism (device may be
      polled mid-tick at different pipeline positions).
    adr: docs/architecture/adr-0006-input-abstraction.md
    added: 2026-06-21

  - pattern: camera_attaches_control
    status: active
    description: >
      Cameras must NEVER call attachControl(). All camera control is purely
      programmatic via ICameraManager.update() each frame.
    why: >
      attachControl() enables the v9.8+ Camera Input Mapping System, which
      would read gamepad/input devices directly — conflicting with ADR-0006
      (only Input Abstraction reads devices). The dual-read would produce
      unpredictable camera movement.
    adr: docs/architecture/adr-0007-camera-architecture.md
    added: 2026-06-21

  - pattern: dev_tools_writes
    status: active
    description: >
      Dev Tools must never write to any system state. It reads data sources
      via registered reader callbacks but must never call emit(), set(), or
      modify game objects.
    why: >
      Dev Tools is a debugging aid — if it can write, a developer-made change
      during debugging could affect game behavior, invalidating the debugging
      session. Enforced at interface level: IDevTools has no write methods.
    adr: docs/architecture/adr-0009-dev-tools.md
    added: 2026-06-21

