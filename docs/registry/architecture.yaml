# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: physics_handling
    status: active
    budget_ms: 0.06
    adr: docs/architecture/adr-0008-vehicle-physics.md
    notes: "8 DYNAMIC bodies, 0 joints. Three-phase pipeline (arcade model + Havok step + velocity override). Well under 16.6ms budget."
    referenced_by:
      - docs/architecture/adr-0008-vehicle-physics.md
    added: 2026-06-21
    revised: ""

