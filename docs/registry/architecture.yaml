# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: cross_system_communication
    status: active
    pattern: event_bus
    description: >
      Systems communicate state changes via typed Event Bus (on/emit/off).
      Never via direct imports between unrelated systems.
      See EventMap for all 20+ typed events.
    adr: docs/architecture/adr-0001-event-bus-architecture.md
    signal_signature: >
      IEventBus.on(event, handler), IEventBus.emit(event, payload).
      Typed via EventMap — wrong payload shape = compile error.
    referenced_by:
      - docs/architecture/adr-0001-event-bus-architecture.md
    added: 2026-06-21
    revised: ""

  - purpose: asset_container_scene_binding
    status: active
    api: |
      LoadAssetContainerAsync(url, null, null, raceScene) for race assets
      then removeAllFromScene() — source meshes cached but invisible.
      instantiateModelsToScene() creates clones in the bound scene (raceScene).
    not: |
      Loading race assets against menuScene then trying to
      instantiateModelsToScene(raceScene) — instantiateModelsToScene()
      does NOT accept a scene parameter.
    adr: docs/architecture/adr-0003-two-scene-architecture.md
    reason: >
      AssetContainers are scene-bound. Meshes, materials, and textures bear a
      _scene reference to the scene passed during LoadAssetContainerAsync.
      instantiateModelsToScene() always clones into the container's bound scene.
    referenced_by:
      - docs/architecture/adr-0003-two-scene-architecture.md
    added: 2026-06-21
    revised: ""

  - contract: input_state
    status: active
    pattern: direct_call
    description: >
      InputState is produced by IInput.getState() every tick (pipeline slot #1).
      Physics slot #2 consumes it without branching on player vs AI.
      AI Driver produces the same shape via AIDriverInput.
    producer: input-system / ai-driver
    consumers:
      - physics-handling # consumes steer/throttle/brake/gearDelta every tick
      - gsm # receives pauseToggle pulse
      - camera # receives cameraToggle pulse
      - menu-lite # receives navUp/navDown/confirm/cancel
      - race-management # receives confirm (PreRace skip)
      - pit-stop # receives confirm (depart pit)
      - dev-tools # receives F3-toggle (from keyboard mapping)
    adr: docs/architecture/adr-0006-input-abstraction.md
    signal_signature: "InputState { steer, throttle, brake, gearDelta, confirm, pauseToggle, cameraToggle, cancel, navUp, navDown }"
    referenced_by:
      - docs/architecture/adr-0006-input-abstraction.md
    added: 2026-06-21
    revised: ""

  - contract: dev_tools_f1_f2
    status: active
    pattern: input_pulse
    description: >
      Toggle key (default: backtick) toggles Dev Tools overlay (visible/hidden). Reload key (default: 1) triggers manual config
      reload. Input system (ADR-0006) must consume these keys with
      event.preventDefault() when Dev Tools is active — they must not reach
      gameplay.
    producer: input-system
    consumers:
      - dev-tools # receives toggle/reload keys (configurable via devTools.keys.*)
    adr: docs/architecture/adr-0009-dev-tools.md
    signal_signature: "InputState (toggle/reload keys as digital pulses, consumed with preventDefault)"
    referenced_by:
      - docs/architecture/adr-0009-dev-tools.md
    added: 2026-06-21
    revised: ""

  - contract: entity_spawned
    status: active
    pattern: event_bus
    description: >
      Emitted by Entity/Car Lifecycle during spawnGrid() per car.
      All systems initialize per-car state upon receiving this event.
    producer: entity-car-lifecycle
    consumers:
      - physics-handling # attaches vehicle constraints and suspension
      - ai-driver # starts behavior tree (AI cars only)
      - fuel # initializes per-car fuel level Map
      - tire-wear # initializes per-car tire condition Map
      - race-management # initializes lap/position/totalDistance per car
      - camera # sets follow target if car is player
      - audio # allocates per-car audio channels
    adr: docs/architecture/adr-0005-entity-car-lifecycle.md
    signal_signature: "entity.spawned(carId: string, teamId: string, gridIndex: number)"
    referenced_by:
      - docs/architecture/adr-0005-entity-car-lifecycle.md
    added: 2026-06-21
    revised: ""

  - contract: entity_despawned
    status: active
    pattern: event_bus
    description: >
      Emitted by Entity/Car Lifecycle during destroyAll() per car.
      All systems clean up per-car state upon receiving this event.
    producer: entity-car-lifecycle
    consumers:
      - physics-handling # disposes vehicle constraints
      - ai-driver # stops behavior tree
      - fuel # clears per-car fuel level Map entry
      - tire-wear # clears per-car tire condition Map entry
      - race-management # clears lap/position/totalDistance entry
      - camera # removes follow target if car is player
      - audio # frees per-car audio channels
    adr: docs/architecture/adr-0005-entity-car-lifecycle.md
    signal_signature: "entity.despawned(carId: string)"
    referenced_by:
      - docs/architecture/adr-0005-entity-car-lifecycle.md
    added: 2026-06-21
    revised: ""
